services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: extremal
      POSTGRES_PASSWORD: extremal
      POSTGRES_DB: extremal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://extremal:extremal@db/extremal
      PORT: "3001"
      RUST_LOG: info
    command: ["extremal-server", "--migrate"]
    depends_on:
      - db

volumes:
  pgdata:
