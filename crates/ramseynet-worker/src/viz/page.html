<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RamseyNet Search Viz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  color: #e0e0e8;
  font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  background: #111118;
  border-bottom: 1px solid #2a2a3a;
}
header h1 {
  font-size: 16px;
  font-weight: 600;
  color: #6366f1;
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #ef4444;
}
.status-dot.connected { background: #22c55e; }
.status-text {
  font-size: 12px;
  color: #8888a0;
}

.stats-bar {
  display: flex;
  gap: 20px;
  padding: 10px 20px;
  background: #0e0e16;
  border-bottom: 1px solid #1a1a2a;
  flex-wrap: wrap;
}
.stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.stat-label {
  font-size: 10px;
  color: #666680;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.stat-value {
  font-size: 14px;
  font-weight: 600;
  color: #c0c0d0;
}
.stat-value.highlight { color: #6366f1; }
.stat-value.valid { color: #22c55e; }
.stat-value.invalid { color: #ef4444; }
.stat-value.warn { color: #f59e0b; }

.chart-section {
  background: #0e0e16;
  border-bottom: 1px solid #1a1a2a;
  overflow: hidden;
  transition: max-height 0.2s ease;
  max-height: 160px;
}
.chart-section.collapsed {
  max-height: 28px;
}
.chart-section.collapsed #history-chart {
  display: none;
}
.chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 20px;
  height: 28px;
}
.chart-title {
  font-size: 11px;
  font-weight: 600;
  color: #666680;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.chart-controls {
  display: flex;
  gap: 4px;
  align-items: center;
}
.time-btn {
  background: #1a1a2a;
  border: 1px solid #2a2a3a;
  color: #8888a0;
  font-size: 10px;
  font-family: inherit;
  padding: 2px 8px;
  border-radius: 3px;
  cursor: pointer;
}
.time-btn:hover { border-color: #4a4a6a; color: #e0e0e8; }
.time-btn.active { background: #6366f130; border-color: #6366f1; color: #6366f1; }
.chart-toggle {
  background: none;
  border: 1px solid #2a2a3a;
  color: #8888a0;
  font-size: 12px;
  font-family: inherit;
  padding: 1px 6px;
  border-radius: 3px;
  cursor: pointer;
  margin-left: 8px;
}
.chart-toggle:hover { border-color: #4a4a6a; color: #e0e0e8; }
#history-chart {
  width: 100%;
  padding: 0 12px 4px 12px;
}

.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}
.matrix-panel {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  min-width: 0;
}
#matrix-canvas {
  border-radius: 8px;
  border: 1px solid #2a2a3a;
  image-rendering: pixelated;
}

.pinned-panel {
  width: 320px;
  border-left: 1px solid #2a2a3a;
  background: #0e0e16;
  display: flex;
  flex-direction: column;
}
.pinned-header {
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 600;
  color: #8888a0;
  border-bottom: 1px solid #1a1a2a;
}
.pinned-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.pinned-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px;
  border-radius: 6px;
  margin-bottom: 4px;
  background: #141420;
  border: 1px solid #1a1a2a;
  cursor: pointer;
}
.pinned-item:hover { background: #1a1a2e; }
.pinned-item.record {
  border-color: #ca8a04;
  background: #1a1810;
}

.rank-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  min-width: 22px;
  height: 18px;
  padding: 0 4px;
  border-radius: 3px;
  vertical-align: middle;
  margin-right: 4px;
}
.rank-1 { background: #eab30830; color: #eab308; }
.rank-2 { background: #94a3b830; color: #94a3b8; }
.rank-3 { background: #cd7f3230; color: #cd7f32; }
.rank-other { background: #2a2a3a; color: #8888a0; }

.score-line {
  font-size: 9px;
  color: #666680;
  font-family: inherit;
  white-space: nowrap;
}

.dup-count {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  background: #2a2a3a;
  color: #8888a0;
  padding: 1px 4px;
  border-radius: 3px;
  margin-left: 4px;
}
.pinned-thumb {
  border-radius: 4px;
  flex-shrink: 0;
}
.pinned-info {
  font-size: 11px;
  line-height: 1.5;
  min-width: 0;
}
.pinned-info .n-label {
  font-weight: 600;
  color: #22c55e;
}
.pinned-item.record .n-label {
  color: #eab308;
}
.pinned-info .strategy-label {
  color: #8888a0;
}
.cid-label {
  font-size: 9px;
  color: #444460;
  font-family: inherit;
}
.found-ago {
  font-size: 9px;
  color: #666680;
}
.found-ago.recent {
  color: #22c55e;
}
.pinned-item.recent {
  border-left: 2px solid #22c55e;
  animation: recentPulse 2s ease-in-out infinite;
}
@keyframes recentPulse {
  0%, 100% { border-left-color: #22c55e; }
  50% { border-left-color: #22c55e60; }
}

.display-limit-select {
  background: #1a1a2a;
  border: 1px solid #2a2a3a;
  color: #8888a0;
  font-size: 10px;
  font-family: inherit;
  padding: 2px 4px;
  border-radius: 3px;
  margin-left: 8px;
  cursor: pointer;
}
.display-limit-select:hover { border-color: #4a4a6a; color: #e0e0e8; }

.empty-msg {
  padding: 20px;
  text-align: center;
  font-size: 12px;
  color: #444460;
}

.detail-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.detail-overlay.open { display: flex; }
.detail-panel {
  background: #111118;
  border: 1px solid #2a2a3a;
  border-radius: 8px;
  padding: 20px;
  max-width: 600px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
}
.detail-panel h3 {
  font-size: 14px;
  color: #6366f1;
  margin-bottom: 12px;
}
.detail-panel pre {
  background: #0a0a0f;
  border: 1px solid #1a1a2a;
  border-radius: 4px;
  padding: 12px;
  font-size: 11px;
  color: #c0c0d0;
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-all;
}
.detail-panel .detail-row {
  display: flex;
  gap: 12px;
  margin-bottom: 8px;
  font-size: 12px;
}
.detail-panel .detail-label { color: #666680; min-width: 80px; }
.detail-panel .detail-value { color: #e0e0e8; }
.detail-close {
  float: right;
  background: none;
  border: 1px solid #2a2a3a;
  color: #8888a0;
  font-size: 12px;
  font-family: inherit;
  padding: 4px 10px;
  border-radius: 4px;
  cursor: pointer;
}
.detail-close:hover { border-color: #4a4a6a; color: #e0e0e8; }
.copy-btn {
  background: #1a1a2a;
  border: 1px solid #2a2a3a;
  color: #8888a0;
  font-size: 10px;
  font-family: inherit;
  padding: 3px 8px;
  border-radius: 4px;
  cursor: pointer;
  margin-top: 6px;
}
.copy-btn:hover { border-color: #4a4a6a; color: #e0e0e8; }

.progress-bar {
  height: 3px;
  background: #1a1a2a;
}
.progress-fill {
  height: 100%;
  background: #6366f1;
  transition: width 0.1s linear;
}
</style>

<header>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
// RGXF decoder (ported from web/src/lib/rgxf.ts)
function decodeRgxf(rgxf) {
  const n = rgxf.n;
  const matrix = Array.from({length: n}, () => new Uint8Array(n));
  if (n < 2) return matrix;
  const raw = atob(rgxf.bits_b64);
  const bytes = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
  let bit = 0;
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      const byteIdx = (bit >> 3);
      const bitIdx = 7 - (bit & 7);
      if (byteIdx < bytes.length && (bytes[byteIdx] & (1 << bitIdx))) {
        matrix[i][j] = 1;
        matrix[j][i] = 1;
      }
      bit++;
    }
  }
  return matrix;
}

// Canvas matrix renderer (ported from MatrixView.svelte)
function drawMatrix(canvas, rgxf, size) {
  const n = rgxf.n;
  const matrix = decodeRgxf(rgxf);
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx.scale(dpr, dpr);

  ctx.fillStyle = '#141420';
  ctx.fillRect(0, 0, size, size);
  if (n === 0) return;

  // Rotated 45°: cell (i,j) → (j-i+(n-1), i+j) in a (2n-1)×(2n-1) grid
  const gridW = 2 * n - 1;
  const cellSize = size / gridW;

  for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
      const rx = j - i + (n - 1);
      const ry = i + j;
      const px = rx * cellSize;
      const py = ry * cellSize;
      if (i === j) {
        ctx.fillStyle = '#1a1a2e';
      } else if (matrix[i][j]) {
        ctx.fillStyle = '#6366f1';
      } else {
        ctx.fillStyle = '#0a0a0f';
      }
      ctx.fillRect(px, py, cellSize + 0.5, cellSize + 0.5);
    }
  }

  // Grid lines along diamond axes
  ctx.strokeStyle = '#2a2a3a';
  ctx.lineWidth = 0.5;
  // Horizontal lines (constant i+j)
  for (let s = 0; s < 2 * n; s++) {
    const iMin = Math.max(0, s - n + 1);
    const iMax = Math.min(s, n - 1);
    if (iMin > iMax) continue;
    const x0 = (s - iMax - iMax + (n - 1)) * cellSize;  // rx for j=s-iMax, i=iMax
    const x1 = (s - iMin - iMin + (n - 1)) * cellSize + cellSize;
    const y = s * cellSize;
    ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x1, y); ctx.stroke();
  }
  // Vertical lines (constant j-i)
  for (let d = -(n - 1); d <= n; d++) {
    const iMin = Math.max(0, -d);
    const iMax = Math.min(n - 1, n - 1 - d);
    if (iMin > iMax) continue;
    const sMin = iMin + (iMin + d);
    const sMax = iMax + (iMax + d);
    const x = (d + (n - 1)) * cellSize;
    ctx.beginPath(); ctx.moveTo(x, sMin * cellSize); ctx.lineTo(x, sMax * cellSize + cellSize); ctx.stroke();
  }
}

// Draw small thumbnail for pinned graphs — rotated diamond with blur
function drawThumb(canvas, rgxf, size) {
  const n = rgxf.n;
  const matrix = decodeRgxf(rgxf);
  const dpr = window.devicePixelRatio || 1;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';

  const gridW = 2 * n - 1;
  const cellSize = size / gridW;

  // Render sharp diamond to offscreen canvas
  const off = document.createElement('canvas');
  off.width = canvas.width;
  off.height = canvas.height;
  const octx = off.getContext('2d');
  octx.scale(dpr, dpr);
  octx.fillStyle = '#141420';
  octx.fillRect(0, 0, size, size);
  if (n === 0) return;

  for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
      const rx = j - i + (n - 1);
      const ry = i + j;
      const px = rx * cellSize;
      const py = ry * cellSize;
      const cs = cellSize + 0.5;
      if (i === j) {
        octx.fillStyle = '#1a1a2e';
      } else if (matrix[i][j]) {
        octx.fillStyle = '#6366f1';
      } else {
        octx.fillStyle = '#0a0a0f';
      }
      octx.fillRect(px, py, cs, cs);
    }
  }

  // Composite: blur base + sharp overlay
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const blurPx = Math.max(0.8, size / 60);
  ctx.filter = 'blur(' + blurPx + 'px)';
  ctx.drawImage(off, 0, 0, size, size);
  ctx.filter = 'none';
  ctx.globalAlpha = 0.55;
  ctx.drawImage(off, 0, 0, size, size);
  ctx.globalAlpha = 1.0;
}

// State
const canvas = document.getElementById('matrix-canvas');
const pinnedList = document.getElementById('pinned-list');
const pinnedCount = document.getElementById('pinned-count');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const progressFill = document.getElementById('progress-fill');
const detailOverlay = document.getElementById('detail-overlay');
const detailPanel = document.getElementById('detail-panel');
const chartSection = document.getElementById('chart-section');
let totalFinds = 0;
let uniqueFinds = 0;
let displayLimit = 10;
let lastElapsedMs = 0;
let lastLeaderboardEntries = [];
// Map<cid, {entry, element}>
const discoveryMap = new Map();

function $(id) { return document.getElementById(id); }

function formatElapsed(ms) {
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  return m + 'm ' + (s % 60) + 's';
}

function formatNum(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

function formatFoundAgo(ms) {
  const s = Math.floor(ms / 1000);
  if (s < 5) return 'just now';
  if (s < 60) return s + 's ago';
  const m = Math.floor(s / 60);
  if (m < 60) return m + 'm ' + (s % 60) + 's ago';
  const h = Math.floor(m / 60);
  return h + 'h ' + (m % 60) + 'm ago';
}

function formatAut(n) {
  if (n >= 1e9) return n.toExponential(1);
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(Math.round(n));
}

// Compute matrix display size
function matrixSize() {
  const panel = document.querySelector('.matrix-panel');
  if (!panel) return 500;
  return Math.min(panel.clientWidth - 40, panel.clientHeight - 40, 600);
}

function rankClass(rank) {
  if (rank === 1) return 'rank-1';
  if (rank === 2) return 'rank-2';
  if (rank === 3) return 'rank-3';
  return 'rank-other';
}

function rankBorderColor(rank) {
  if (rank === 1) return '#eab308';
  if (rank === 2) return '#94a3b8';
  if (rank === 3) return '#cd7f32';
  return '#2a2a3a';
}

// --- Chart.js time history ---
const MAX_CHART_POINTS = 3000;
const chartData = {
  violations: [],  // [{x: elapsed_s, y: value}]
  kCliques: [],
  ellIndsets: [],
};
let chartTimeWindow = 60000; // default 1m
let chart = null;

function initChart() {
  if (typeof Chart === 'undefined') {
    chartSection.style.display = 'none';
    return;
  }

  const ctx = document.getElementById('history-chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [
        {
          label: 'Violations',
          data: [],
          borderColor: '#ef4444',
          backgroundColor: '#ef444420',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.1,
          fill: false,
        },
        {
          label: 'k-cliques',
          data: [],
          borderColor: '#f59e0b',
          backgroundColor: '#f59e0b20',
          borderWidth: 1,
          pointRadius: 0,
          tension: 0.1,
          fill: false,
        },
        {
          label: 'l-indep',
          data: [],
          borderColor: '#eab308',
          backgroundColor: '#eab30820',
          borderWidth: 1,
          pointRadius: 0,
          tension: 0.1,
          fill: false,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: {
          display: true,
          position: 'right',
          labels: {
            color: '#8888a0',
            font: { size: 10, family: 'monospace' },
            boxWidth: 12,
            padding: 6,
          },
        },
        tooltip: {
          enabled: true,
          bodyFont: { size: 10, family: 'monospace' },
          titleFont: { size: 10, family: 'monospace' },
        },
      },
      scales: {
        x: {
          type: 'linear',
          title: { display: false },
          ticks: {
            color: '#666680',
            font: { size: 9, family: 'monospace' },
            callback: function(v) { return (v / 1000).toFixed(0) + 's'; },
            maxTicksLimit: 8,
          },
          grid: { color: '#1a1a2a' },
        },
        y: {
          type: 'linear',
          title: { display: false },
          ticks: {
            color: '#666680',
            font: { size: 9, family: 'monospace' },
            maxTicksLimit: 5,
          },
          grid: { color: '#1a1a2a' },
          beginAtZero: true,
        },
      },
    },
  });
}

function pushChartPoint(arr, x, y) {
  arr.push({x: x, y: y});
  if (arr.length > MAX_CHART_POINTS) arr.shift();
}

function updateChart() {
  if (!chart) return;

  const now = chartData.violations.length > 0
    ? chartData.violations[chartData.violations.length - 1].x
    : 0;
  const minX = chartTimeWindow > 0 ? now - chartTimeWindow : 0;

  function filterWindow(arr) {
    if (chartTimeWindow <= 0) return arr;
    // Find first index >= minX
    let start = 0;
    for (let i = 0; i < arr.length; i++) {
      if (arr[i].x >= minX) { start = i; break; }
      start = i;
    }
    return arr.slice(start);
  }

  chart.data.datasets[0].data = filterWindow(chartData.violations);
  chart.data.datasets[1].data = filterWindow(chartData.kCliques);
  chart.data.datasets[2].data = filterWindow(chartData.ellIndsets);

  if (chartTimeWindow > 0) {
    chart.options.scales.x.min = minX;
    chart.options.scales.x.max = undefined;
  } else {
    chart.options.scales.x.min = undefined;
    chart.options.scales.x.max = undefined;
  }

  chart.update('none');
}

// Chart controls
document.querySelectorAll('.time-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.time-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    chartTimeWindow = parseInt(btn.dataset.window, 10);
    updateChart();
  });
});

document.getElementById('chart-toggle').addEventListener('click', function() {
  chartSection.classList.toggle('collapsed');
  this.textContent = chartSection.classList.contains('collapsed') ? '+' : '_';
});

// --- WebSocket ---
let ws;
let reconnectDelay = 500;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');

  ws.onopen = () => {
    statusDot.classList.add('connected');
    statusText.textContent = 'connected';
    reconnectDelay = 500;
  };

  ws.onclose = () => {
    statusDot.classList.remove('connected');
    statusText.textContent = 'reconnecting...';
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 1.5, 5000);
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'snapshot') {
      handleSnapshot(msg);
    } else if (msg.type === 'leaderboard') {
      handleLeaderboard(msg);
    } else if (msg.type === 'hello') {
      statusText.textContent = 'connected (v' + msg.version + ')';
    }
  };
}

function handleSnapshot(snap) {
  lastElapsedMs = snap.elapsed_ms;
  // Update stats
  $('s-strategy').textContent = snap.strategy;
  $('s-n').textContent = snap.n;
  $('s-params').textContent = 'R(' + snap.k + ',' + snap.ell + ')';
  $('s-iter').textContent = formatNum(snap.iteration) + ' / ' + formatNum(snap.max_iters);
  $('s-edges').textContent = snap.edges;

  const viol = $('s-violations');
  viol.textContent = snap.violation_score;
  viol.className = 'stat-value ' + (snap.violation_score === 0 ? 'valid' : 'invalid');

  // k-cliques and l-indep stats
  const kc = $('s-kcliques');
  if (snap.k_cliques != null) {
    kc.textContent = snap.k_cliques;
    kc.className = 'stat-value ' + (snap.k_cliques === 0 ? 'valid' : 'warn');
  } else {
    kc.textContent = '--';
    kc.className = 'stat-value';
  }

  const li = $('s-lindep');
  if (snap.ell_indsets != null) {
    li.textContent = snap.ell_indsets;
    li.className = 'stat-value ' + (snap.ell_indsets === 0 ? 'valid' : 'warn');
  } else {
    li.textContent = '--';
    li.className = 'stat-value';
  }

  const valid = $('s-valid');
  valid.textContent = snap.valid ? 'YES' : 'no';
  valid.className = 'stat-value ' + (snap.valid ? 'valid' : 'invalid');

  $('s-speed').textContent = snap.throughput > 0 ? formatNum(Math.round(snap.throughput)) + '/s' : '--';
  $('s-elapsed').textContent = formatElapsed(snap.elapsed_ms);

  // Progress bar
  const pct = snap.max_iters > 0 ? (snap.iteration / snap.max_iters) * 100 : 0;
  progressFill.style.width = Math.min(pct, 100) + '%';

  // Draw matrix
  const size = matrixSize();
  drawMatrix(canvas, snap.graph, size);

  // Feed chart
  if (chart) {
    const t = snap.elapsed_ms;
    pushChartPoint(chartData.violations, t, snap.violation_score);
    if (snap.k_cliques != null) {
      pushChartPoint(chartData.kCliques, t, snap.k_cliques);
    }
    if (snap.ell_indsets != null) {
      pushChartPoint(chartData.ellIndsets, t, snap.ell_indsets);
    }
    updateChart();
  }
}

function handleLeaderboard(msg) {
  // Full board replacement — server sends {type: "leaderboard", entries: [...]}
  lastLeaderboardEntries = msg.entries || [];
  renderLeaderboard();
}

function renderLeaderboard() {
  const entries = lastLeaderboardEntries;

  // Clear state
  discoveryMap.clear();
  pinnedList.innerHTML = '';
  uniqueFinds = entries.length;
  totalFinds = 0;
  for (const e of entries) totalFinds += e.times_found || 1;

  const visible = displayLimit > 0 ? entries.slice(0, displayLimit) : entries;

  if (visible.length === 0) {
    pinnedList.innerHTML = '<div class="empty-msg">Waiting for valid graphs...</div>';
    pinnedCount.textContent = '';
    return;
  }

  for (const entry of visible) {
    const el = createEntryElement(entry);
    pinnedList.appendChild(el);
    discoveryMap.set(entry.cid, { entry: entry, element: el });
  }

  const showing = displayLimit > 0 ? Math.min(displayLimit, entries.length) : entries.length;
  pinnedCount.textContent = '(showing ' + showing + ' of ' + uniqueFinds + ' unique / ' + totalFinds + ' total)';

  updateFoundAgo();
}

function createEntryElement(entry) {
  const cid = entry.cid || '';
  const shortCid = cid.substring(0, 12);
  const score = entry.score || {};

  const item = document.createElement('div');
  item.className = 'pinned-item' + (entry.is_record ? ' record' : '');
  item.dataset.cid = cid;
  item.style.borderColor = rankBorderColor(entry.rank);

  const thumb = document.createElement('canvas');
  thumb.className = 'pinned-thumb';
  drawThumb(thumb, entry.graph, 48);

  const info = document.createElement('div');
  info.className = 'pinned-info';

  const rankBadge = '<span class="rank-badge ' + rankClass(entry.rank) + '">#' + entry.rank + '</span>';
  const dupBadge = (entry.times_found || 1) > 1 ? '<span class="dup-count">\u00d7' + entry.times_found + '</span>' : '<span class="dup-count">\u00d71</span>';
  const scoreLine = '<span class="score-line">\u03c9=' + (score.omega||'?') + ' \u03b1=' + (score.alpha||'?') +
    ' | C\u03c9=' + (score.c_omega||'?') + ' C\u03b1=' + (score.c_alpha||'?') +
    ' | G#=' + (score.goodman||'?') + ' \u0394=' + (score.goodman_gap!=null?score.goodman_gap:'?') +
    ' | Aut:' + formatAut(score.aut_order||0) + '</span>';

  const age = lastElapsedMs > entry.found_at_ms ? lastElapsedMs - entry.found_at_ms : 0;
  const foundAgoText = formatFoundAgo(age);

  info.innerHTML =
    rankBadge + '<span class="n-label">n=' + entry.n + '</span>' + dupBadge + '<br>' +
    '<span class="strategy-label">' + entry.strategy + '</span> <span class="found-ago" data-found-at="' + entry.found_at_ms + '">' + foundAgoText + '</span><br>' +
    scoreLine + '<br>' +
    '<span class="cid-label">' + shortCid + '\u2026</span>';

  item.addEventListener('click', function() {
    const d = discoveryMap.get(cid);
    if (d) showDetail(d.entry);
  });

  item.appendChild(thumb);
  item.appendChild(info);
  return item;
}

function showDetail(entry) {
  const cid = entry.cid || '';
  const score = entry.score || {};
  const rgxfJson = JSON.stringify(entry.graph, null, 2);

  detailPanel.innerHTML =
    '<button class="detail-close" id="detail-close">\u2715 Close</button>' +
    '<h3>Graph Detail</h3>' +
    '<div class="detail-row"><span class="detail-label">Rank</span><span class="detail-value"><span class="rank-badge ' + rankClass(entry.rank) + '">#' + entry.rank + '</span></span></div>' +
    '<div class="detail-row"><span class="detail-label">CID</span><span class="detail-value" style="word-break:break-all;font-size:11px">' + cid + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">n</span><span class="detail-value">' + entry.n + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">Strategy</span><span class="detail-value">' + entry.strategy + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">\u03c9 (clique #)</span><span class="detail-value">' + (score.omega||'?') + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">\u03b1 (indep #)</span><span class="detail-value">' + (score.alpha||'?') + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">C\u03c9 (max cliques)</span><span class="detail-value">' + (score.c_omega||'?') + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">C\u03b1 (max indep)</span><span class="detail-value">' + (score.c_alpha||'?') + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">Goodman #</span><span class="detail-value">' + (score.goodman!=null?score.goodman:'?') + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">Goodman gap</span><span class="detail-value">' + (score.goodman_gap!=null?score.goodman_gap:'?') + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">|Aut(G)|</span><span class="detail-value">' + (score.aut_order||'?') + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">Times found</span><span class="detail-value">' + (entry.times_found||1) + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">RGXF</span></div>' +
    '<pre id="rgxf-json">' + escapeHtml(rgxfJson) + '</pre>' +
    '<button class="copy-btn" id="copy-rgxf">Copy RGXF JSON</button>';

  detailOverlay.classList.add('open');

  document.getElementById('detail-close').addEventListener('click', function() {
    detailOverlay.classList.remove('open');
  });
  document.getElementById('copy-rgxf').addEventListener('click', function() {
    navigator.clipboard.writeText(rgxfJson).then(function() {
      document.getElementById('copy-rgxf').textContent = 'Copied!';
      setTimeout(function() { document.getElementById('copy-rgxf').textContent = 'Copy RGXF JSON'; }, 1500);
    });
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Close detail on overlay click
detailOverlay.addEventListener('click', function(e) {
  if (e.target === detailOverlay) detailOverlay.classList.remove('open');
});

// Handle resize
window.addEventListener('resize', () => {
  // Redraw at new size on next snapshot
});

// Display limit selector
document.getElementById('display-limit').addEventListener('change', function() {
  displayLimit = parseInt(this.value, 10);
  renderLeaderboard();
});

// Live "found ago" timer + recency highlighting
function updateFoundAgo() {
  const spans = pinnedList.querySelectorAll('.found-ago');
  if (spans.length === 0 || lastElapsedMs === 0) return;

  // Compute ages for all visible entries
  const ages = [];
  spans.forEach(function(span) {
    const foundAt = parseInt(span.dataset.foundAt, 10);
    const age = lastElapsedMs > foundAt ? lastElapsedMs - foundAt : 0;
    ages.push(age);
  });

  // Median-based recency threshold
  const sorted = ages.slice().sort(function(a, b) { return a - b; });
  const median = sorted.length > 0 ? sorted[Math.floor(sorted.length / 2)] : 0;
  const recentThreshold = Math.min(median, 30000);

  spans.forEach(function(span, i) {
    const age = ages[i];
    span.textContent = formatFoundAgo(age);
    const isRecent = age < recentThreshold;
    span.classList.toggle('recent', isRecent);
    // Update parent .pinned-item recency class
    const item = span.closest('.pinned-item');
    if (item) item.classList.toggle('recent', isRecent);
  });
}

setInterval(updateFoundAgo, 1000);

// Init
initChart();
connect();
</script>
